    function getCurrentUser() { return JSON.parse(localStorage.getItem('campus_current_user')); }
    function goToDetail(id) { if(getCurrentUser()) window.location.href=`productInfo.html?id=${id}`; else alert('请先登录'); }
    function updateCartBadge() { const user=getCurrentUser(); if(!user) { document.getElementById('cartCountNav').innerText='0'; return; } const cart=JSON.parse(localStorage.getItem(`cart_${user.username}`)||'[]'); const total=cart.reduce((s,i)=>s+(i.quantity||0),0); document.getElementById('cartCountNav').innerText=total; }
    function highlightText(text, keyword) { if(!keyword) return text; const regex=new RegExp(`(${escapeRegex(keyword)})`,'gi'); return text.replace(regex,`<span class="highlight">$1</span>`); }
    function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
    
    let currentCategory = '', currentKeyword = '';
    function renderGoods() {
        let filtered = currentCategory ? PRODUCTS.filter(p=>p.category===currentCategory) : [...PRODUCTS];
        if(currentKeyword.trim()) {
            const kw = currentKeyword.toLowerCase();
            filtered = filtered.filter(p => p.name.toLowerCase().includes(kw) || p.desc.toLowerCase().includes(kw));
        }
        const container = document.getElementById('goodsList');
        const resultInfo = document.getElementById('resultInfo');
        if(filtered.length === 0) {
            container.innerHTML = `<div class="col-12 text-center py-5"><i class="fas fa-search fa-3x text-muted mb-3"></i><h5>没有找到相关商品</h5><button class="btn btn-outline-primary rounded-pill" id="resetFromEmpty">查看全部商品</button></div>`;
            document.getElementById('resetFromEmpty')?.addEventListener('click', () => resetAllFilters());
            resultInfo.innerHTML = `未找到与“${escapeHtml(currentKeyword)}”相关的商品`;
            return;
        }
        let html = '';
        filtered.forEach(p => {
            html += `<div class="col-md-4 col-lg-3 mb-4">
                <div class="card product-card h-100">
                    <img src="${p.imageUrl}" class="card-img-top-custom" alt="${p.name}" onerror="this.src='https://placehold.co/400x400?text=暂无图片'">
                    <div class="card-body">
                        <h5 class="card-title">${highlightText(p.name, currentKeyword)}</h5>
                        <p class="card-text text-muted small">${highlightText(p.desc, currentKeyword)}</p>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="fw-bold text-primary fs-5">¥${p.price}</span>
                            <button class="btn btn-sm btn-outline-campus rounded-pill detail-btn" data-id="${p.id}">查看详情</button>
                        </div>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.detail-btn').forEach(btn => btn.addEventListener('click', () => goToDetail(parseInt(btn.dataset.id))));
        if(currentKeyword) resultInfo.innerHTML = `🔍 找到 <strong>${filtered.length}</strong> 件与“${escapeHtml(currentKeyword)}”相关的商品`;
        else if(currentCategory) resultInfo.innerHTML = `📂 分类“${currentCategory}”共有 <strong>${filtered.length}</strong> 件商品`;
        else resultInfo.innerHTML = `✨ 共 ${PRODUCTS.length} 款校园文创好物`;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function resetAllFilters() { currentKeyword = ''; currentCategory = ''; document.getElementById('searchInput').value = ''; document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active')); document.querySelector('.category-btn[data-category=""]').classList.add('active'); renderGoods(); const url = new URL(window.location.href); url.searchParams.delete('keyword'); window.history.replaceState({}, '', url); }
    function performSearch() { currentKeyword = document.getElementById('searchInput').value.trim(); currentCategory = ''; document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active')); document.querySelector('.category-btn[data-category=""]').classList.add('active'); renderGoods(); const url = new URL(window.location.href); if(currentKeyword) url.searchParams.set('keyword', currentKeyword); else url.searchParams.delete('keyword'); window.history.replaceState({}, '', url); }
    function setCategory(cat) { currentCategory = cat; currentKeyword = ''; document.getElementById('searchInput').value = ''; document.querySelectorAll('.category-btn').forEach(btn => { if(btn.dataset.category === cat) btn.classList.add('active'); else btn.classList.remove('active'); }); renderGoods(); const url = new URL(window.location.href); url.searchParams.delete('keyword'); window.history.replaceState({}, '', url); }
    
    function initFromUrl() { const urlParams = new URLSearchParams(window.location.search); const keyword = urlParams.get('keyword'); if(keyword) { document.getElementById('searchInput').value = keyword; currentKeyword = keyword; currentCategory = ''; document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active')); document.querySelector('.category-btn[data-category=""]').classList.add('active'); renderGoods(); } else { renderGoods(); } }
    
    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('resetBtn').addEventListener('click', resetAllFilters);
    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') performSearch(); });
    document.querySelectorAll('.category-btn').forEach(btn => btn.addEventListener('click', () => setCategory(btn.dataset.category)));
    document.getElementById('cartNavLink')?.addEventListener('click', (e) => { e.preventDefault(); if(getCurrentUser()) window.location.href='shoppingCar.html'; else alert('请先登录'); });
    document.getElementById('userCenterLink')?.addEventListener('click', (e) => { e.preventDefault(); if(getCurrentUser()) window.location.href='ownerCenter.html'; else alert('请先登录'); });
    
    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => backBtn.classList.toggle('show', window.scrollY > 300));
    backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    
    document.querySelector('.category-btn[data-category=""]').classList.add('active');
    initFromUrl();
    updateCartBadge();
</script>
