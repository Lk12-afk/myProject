<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · 文创栈毕业季</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #fdf8f0 0%, #fff0e0 100%); min-height: 100vh; display: flex; align-items: center; }
        .card-register { border-radius: 28px; border: none; box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1); background: rgba(255,255,255,0.96); }
        .btn-campus { background: #d68c3c; color: white; border-radius: 40px; font-weight: 600; border: none; }
        .btn-campus:hover { background: #b6622a; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-register p-4 p-md-5">
                <div class="text-center mb-3"><i class="fas fa-leaf" style="font-size: 2.5rem; color:#d68c3c;"></i><h3 class="fw-bold mt-2">加入文创栈</h3></div>
                <form id="registerForm">
                    <div class="mb-3"><label class="form-label">用户名 (登录用)</label><input type="text" class="form-control" id="regUser" placeholder="英文字母/数字" required></div>
                    <div class="mb-3"><label class="form-label">昵称 (显示名称)</label><input type="text" class="form-control" id="regNick" placeholder="同学/昵称" required></div>
                    <div class="mb-3"><label class="form-label">密码</label><input type="password" class="form-control" id="regPwd" placeholder="至少6位" required></div>
                    <div class="mb-4"><label class="form-label">确认密码</label><input type="password" class="form-control" id="regConfirmPwd" required></div>
                    <button type="submit" class="btn btn-campus w-100"><i class="fas fa-user-plus me-2"></i>注册新账号</button>
                </form>
                <div class="text-center mt-4"><span class="text-muted">已有账号？</span><a href="load.html" class="fw-semibold" style="color:#d68c3c;">去登录</a></div>
                <hr class="my-4"><div class="text-center small text-muted"><i class="fas fa-leaf me-1"></i> 银杏叶寄情 · 文创栈祝毕业生前程似锦</div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('regUser').value.trim();
        const nickname = document.getElementById('regNick').value.trim();
        const password = document.getElementById('regPwd').value.trim();
        const confirmPwd = document.getElementById('regConfirmPwd').value.trim();
        if(!username || !nickname || !password) { alert('请完整填写信息'); return; }
        if(password !== confirmPwd) { alert('两次密码输入不一致'); return; }
        if(password.length < 6) { alert('密码至少6位'); return; }
        const users = JSON.parse(localStorage.getItem('campus_users') || '[]');
        if(users.find(u => u.username === username)) { alert('用户名已存在，请更换'); return; }
        const newId = Date.now();
        users.push({ id: newId, username, nickname, password });
        localStorage.setItem('campus_users', JSON.stringify(users));
        alert('注册成功！请登录');
        window.location.href = 'load.html';
    });
    if(localStorage.getItem('campus_current_user')) window.location.href = 'homepage.html';
</script>
</body>
</html>
