    function getCurrentUser() { return JSON.parse(localStorage.getItem('campus_current_user')); }
    function updateCartBadge() { 
        const user = getCurrentUser(); 
        if(!user) { const badge = document.getElementById('cartCount'); if(badge) badge.innerText='0'; return; } 
        const cart = JSON.parse(localStorage.getItem(`cart_${user.username}`)||'[]'); 
        const total = cart.reduce((s,i)=>s+(i.quantity||0),0); 
        const badge = document.getElementById('cartCount'); if(badge) badge.innerText=total; 
    }
    function addToCart(product, qty) {
        let user = getCurrentUser(); 
        if(!user){ alert('请先登录'); window.location.href='load.html'; return; }
        let cartKey = `cart_${user.username}`;
        let cart = JSON.parse(localStorage.getItem(cartKey)||'[]');
        let exist = cart.find(item=>item.id===product.id);
        if(exist) exist.quantity += qty;
        else cart.push({ id:product.id, name:product.name, price:product.price, quantity:qty, imageUrl:product.imageUrl, checked: false });
        localStorage.setItem(cartKey, JSON.stringify(cart));
        alert(`✅ 成功添加 ${qty} 件「${product.name}」至购物车`);
        updateCartBadge();
    }
    function buyNow(product, qty) { 
        addToCart(product, qty); 
        window.location.href='shoppingCar.html'; 
    }
    function handleCartClick(e) { e.preventDefault(); if(!getCurrentUser()) alert('请先登录'); else window.location.href='shoppingCar.html'; }
    function handleProfileClick(e) { e.preventDefault(); if(!getCurrentUser()) window.location.href='load.html'; else window.location.href='ownerCenter.html'; }

    // ==================== 评论功能 ====================
    function getComments(productId) {
        const key = `comments_${productId}`;
        return JSON.parse(localStorage.getItem(key) || '[]');
    }
    function saveComments(productId, comments) {
        localStorage.setItem(`comments_${productId}`, JSON.stringify(comments));
    }
    function addComment(productId, content) {
        const user = getCurrentUser();
        if (!user) {
            alert('请先登录后再发表评论');
            return false;
        }
        if (!content || content.trim() === '') {
            alert('评论内容不能为空');
            return false;
        }
        const comments = getComments(productId);
        const newComment = {
            id: Date.now(),
            userId: user.userId || user.username,
            nickname: user.nickname || user.username,
            content: content.trim(),
            time: new Date().toLocaleString()
        };
        comments.unshift(newComment); // 最新评论在前
        saveComments(productId, comments);
        return true;
    }
    function renderComments(productId, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const comments = getComments(productId);
        if (comments.length === 0) {
            container.innerHTML = '<div class="text-muted text-center py-3">暂无评论，来说两句吧~</div>';
            return;
        }
        let html = `<div class="comment-count">📝 共 ${comments.length} 条评论</div>`;
        comments.forEach(c => {
            html += `
                <div class="comment-item">
                    <span class="comment-nick">${escapeHtml(c.nickname)}</span>
                    <span class="comment-time">${escapeHtml(c.time)}</span>
                    <div class="comment-content">${escapeHtml(c.content)}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 页面初始化
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));
    const product = PRODUCTS.find(p => p.id === productId);
    if (!product) { 
        document.getElementById('detailRoot').innerHTML = '<div class="alert alert-danger text-center">商品不存在</div>'; 
    } else {
        let quantity = 1;
        // 商品详情HTML
        const productHtml = `
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="bg-white p-3 text-center rounded-4 shadow-sm">
                        <img src="${product.imageUrl}" class="product-img-large" alt="${product.name}" onerror="this.src='https://placehold.co/600x400?text=图片缺失'">
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card detail-card p-4 shadow-sm border-0">
                        <h2 class="fw-bold">${product.name}</h2>
                        <p class="text-muted mt-2">${product.desc}</p>
                        <h3 class="text-primary mt-3">¥${product.price}</h3>
                        <p class="mt-2"><i class="fas fa-box"></i> 库存：${product.stock}件</p>
                        <div class="d-flex align-items-center gap-3 my-4">
                            <span class="fw-semibold">数量</span>
                            <button class="qty-btn" id="minusBtn">−</button>
                            <span id="qtyVal" class="fw-bold mx-2">1</span>
                            <button class="qty-btn" id="plusBtn">+</button>
                        </div>
                        <div class="d-flex gap-3 flex-wrap">
                            <button class="btn btn-graduation rounded-pill px-4 py-2" id="addCartBtn"><i class="fas fa-cart-plus"></i> 加入购物车</button>
                            <button class="btn btn-outline-graduation rounded-pill px-4 py-2" id="buyNowBtn"><i class="fas fa-bolt"></i> 立即购买</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 评论区域 -->
            <div class="comment-section" id="commentSection">
                <h5><i class="fas fa-comments"></i> 商品评价</h5>
                <div class="mb-3">
                    <textarea id="commentContent" class="form-control" rows="2" placeholder="分享你的使用感受...（登录后可发表）"></textarea>
                    <button id="submitCommentBtn" class="btn btn-graduation btn-sm mt-2 rounded-pill">发表评论</button>
                </div>
                <div id="commentsList"></div>
            </div>
        `;
        document.getElementById('detailRoot').innerHTML = productHtml;
        
        // 绑定商品数量按钮
        const minus = document.getElementById('minusBtn'), plus = document.getElementById('plusBtn'), qtySpan = document.getElementById('qtyVal');
        minus.onclick = () => { if(quantity > 1) { quantity--; qtySpan.innerText = quantity; } };
        plus.onclick = () => { if(quantity < product.stock) { quantity++; qtySpan.innerText = quantity; } else alert('库存不足'); };
        document.getElementById('addCartBtn').onclick = () => addToCart(product, quantity);
        document.getElementById('buyNowBtn').onclick = () => buyNow(product, quantity);
        
        // 渲染评论列表
        renderComments(product.id, 'commentsList');
        
        // 发表评论
        const submitBtn = document.getElementById('submitCommentBtn');
        const commentInput = document.getElementById('commentContent');
        submitBtn.addEventListener('click', () => {
            const content = commentInput.value;
            if (addComment(product.id, content)) {
                commentInput.value = '';
                renderComments(product.id, 'commentsList');
                alert('评论发表成功！');
            }
        });
    }
    
    document.getElementById('cartNavLink')?.addEventListener('click', handleCartClick);
    document.getElementById('userCenterLink')?.addEventListener('click', handleProfileClick);
    updateCartBadge();
</script>
